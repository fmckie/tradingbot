[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that may require mocked external services
    slow: Slow tests that should be run less frequently
    asyncio: Tests that use asyncio

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (requires pytest-timeout plugin, install with: pip install pytest-timeout)
# timeout = 30

# Coverage (when using pytest-cov)
# Run with: pytest --cov=. --cov-report=html
