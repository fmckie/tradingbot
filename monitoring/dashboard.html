<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trading Competition — Live Monitor</title>
  <style>
    :root {
      --bg: #070B14;
      --panel: #0b1220;
      --panel-2: #0f1828;
      --inner: #0d1626;
      --line: #22304d;
      --line-soft: #18233b;
      --text: #EAF0F8;
      --muted: #9FB0C8;
      --muted-2: #64748B;
      --green: #46C46A;
      --green-dim: #1d3a28;
      --red: #FF6B6B;
      --red-dim: #3a2030;
      --blue: #5AA2FF;
      --amber: #F2C14E;
      --chip: #111c30;
      --shadow: none;
    }
    html[data-theme="light"] {
      --bg: #f3f1ea;
      --panel: #faf9f4;
      --panel-2: #f2f0e8;
      --inner: #fbfaf6;
      --line: #1a1a1a;
      --line-soft: #c9c6ba;
      --text: #161510;
      --muted: #5d5b50;
      --muted-2: #8d8a7d;
      --green: #1a7f37;
      --green-dim: #e3efe4;
      --red: #c0392b;
      --red-dim: #f4e2de;
      --blue: #1f6feb;
      --amber: #8a5a00;
      --chip: #edeadf;
      --shadow: none;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
        "DejaVu Sans Mono", "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 22px 22px 40px; }

    /* ---- header ---- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 13px 16px;
    }
    .brand {
      font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
      display: flex; align-items: center; gap: 12px;
    }
    .status { display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      font-size: 11px; letter-spacing: 0.5px; color: var(--muted); }
    .status b { color: var(--text); letter-spacing: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      display: inline-block; margin-right: 6px; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    .pill {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      padding: 2px 8px; border: 1px solid var(--line);
      color: var(--amber); background: transparent;
    }
    .toggle { display: flex; gap: 0; border: 1px solid var(--line); }
    .toggle a {
      color: var(--muted-2); text-decoration: none; padding: 3px 9px;
      font-size: 10px; letter-spacing: 1px; font-weight: 700;
    }
    .toggle a.active { color: var(--text); background: var(--panel-2); }

    .subtitle { color: var(--muted); font-size: 12px; letter-spacing: 0.4px;
      padding: 10px 2px 16px; }

    /* ---- generic panel ---- */
    .panel { border: 1px solid var(--line); background: var(--panel); margin-bottom: 14px; }
    .panel-h {
      font-size: 12px; font-weight: 700; letter-spacing: 2px;
      padding: 9px 14px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .panel-h .sub { font-weight: 400; letter-spacing: 1px; color: var(--muted-2); font-size: 10px; }
    .panel-b { padding: 14px; }

    /* ---- agent cards ---- */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .agent { border: 1px solid var(--line); background: var(--panel); }
    .agent-h {
      display: flex; align-items: center; gap: 11px;
      padding: 12px 14px; border-bottom: 1px solid var(--line);
    }
    .glyph {
      width: 26px; height: 26px; border: 1px solid var(--line-soft);
      display: grid; place-items: center; font-size: 14px; font-weight: 700;
      color: var(--amber); flex: none;
    }
    .agent-name { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .agent-b { padding: 12px 14px 14px; }
    .equity { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; margin: 2px 0 2px; }
    .equity-l { font-size: 10px; letter-spacing: 1.5px; color: var(--muted-2); }
    .rows { margin-top: 12px; }
    .r {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 5px 0; border-top: 1px solid var(--line-soft);
    }
    .r:first-child { border-top: none; }
    .r .k { color: var(--muted); font-size: 11px; letter-spacing: 1px; }
    .r .v { font-weight: 700; font-variant-numeric: tabular-nums; }

    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }

    /* ---- decisions ---- */
    .dec-agent { padding: 10px 0; border-top: 1px solid var(--line-soft); }
    .dec-agent:first-child { padding-top: 0; border-top: none; }
    .dec-top { display: flex; justify-content: space-between; align-items: baseline; }
    .dec-name { font-weight: 700; letter-spacing: 1px; }
    .dec-count { color: var(--muted-2); font-size: 11px; letter-spacing: 1px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      font-size: 11px; letter-spacing: 0.5px; padding: 2px 8px;
      border: 1px solid var(--line-soft); background: var(--chip); color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .chip b { color: var(--text); }
    .chip.buy { color: var(--green); border-color: var(--green); }
    .chip.buy b { color: var(--green); }
    .chip.sell { color: var(--red); border-color: var(--red); }
    .chip.hold { color: var(--muted); }
    .chips-l { font-size: 10px; letter-spacing: 1.5px; color: var(--muted-2); margin-top: 9px; }

    /* ---- risk controls ---- */
    .cannot {
      color: var(--red); font-weight: 700; letter-spacing: 1.5px; font-size: 11px;
      border: 1px solid var(--red); padding: 6px 10px; margin-bottom: 12px;
      display: inline-block;
    }
    .risk-r {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 6px 0; border-top: 1px solid var(--line-soft);
    }
    .risk-r:first-of-type { border-top: none; }
    .risk-r .k { color: var(--muted); font-size: 11px; letter-spacing: 1px; }
    .risk-r .v { font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ---- orders table ---- */
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    thead th {
      text-align: left; font-size: 10px; letter-spacing: 1.5px; color: var(--muted-2);
      font-weight: 700; padding: 8px 10px; border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    thead th.num, tbody td.num { text-align: right; }
    tbody td {
      padding: 9px 10px; border-bottom: 1px solid var(--line-soft);
      white-space: nowrap; font-size: 12px;
    }
    tbody tr:last-child td { border-bottom: none; }
    td.action.buy { color: var(--green); font-weight: 700; }
    td.action.sell { color: var(--red); font-weight: 700; }
    td.action.hold { color: var(--muted); font-weight: 700; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 7px; border: 1px solid; white-space: nowrap; }
    .badge.ok { color: var(--green); border-color: var(--green); }
    .badge.rej { color: var(--red); border-color: var(--red); }
    td.reason { color: var(--muted-2); font-size: 11px; max-width: 320px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---- KPI strip ---- */
    .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 14px; }
    .kpi { border: 1px solid var(--line); background: var(--panel); padding: 14px 14px 13px; }
    .kpi .big { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
    .kpi .lbl { font-size: 10px; letter-spacing: 1px; color: var(--muted); margin-top: 5px; }
    .kpi.accent-blue .big { color: var(--blue); }
    .kpi.accent-amber .big { color: var(--amber); }
    .kpi.accent-green .big { color: var(--green); }
    .kpi.accent-red .big { color: var(--red); }

    /* ---- footer ---- */
    .footer {
      border: 1px solid var(--line); background: var(--panel-2);
      color: var(--muted-2); font-size: 11px; letter-spacing: 0.5px;
      padding: 10px 14px; text-align: center;
    }
    .err { color: var(--amber); }

    @media (max-width: 820px) {
      .grid2 { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span id="title">AI TRADING COMPETITION</span>
        <span class="pill" id="mode">PAPER</span></div>
      <div class="status">
        <span class="toggle">
          <a href="?theme=dark" id="t-dark">DARK</a>
          <a href="?theme=light" id="t-light">LIGHT</a>
        </span>
        <span><span class="dot"></span>LAST UPDATED <b id="updated">--:--:--</b></span>
      </div>
    </div>
    <div class="subtitle" id="subtitle">&nbsp;</div>

    <section class="grid2" id="agents"></section>

    <div class="grid2">
      <section class="panel">
        <div class="panel-h">DECISION LOG <span class="sub" id="dec-total"></span></div>
        <div class="panel-b" id="decisions"></div>
      </section>
      <section class="panel">
        <div class="panel-h">RISK CONTROLS <span class="sub">ENFORCED PRE-TRADE</span></div>
        <div class="panel-b" id="risk"></div>
      </section>
    </div>

    <section class="panel">
      <div class="panel-h">DECISION / ORDER LOG <span class="sub" id="ord-sub"></span></div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>TIME</th><th>AGENT</th><th>ACTION</th><th>SYMBOL</th>
              <th class="num">QTY</th><th class="num">ENTRY</th>
              <th class="num">STOP</th><th class="num">TAKE</th>
              <th>RESULT</th><th>RISK-GATE</th>
            </tr>
          </thead>
          <tbody id="orders"></tbody>
        </table>
      </div>
    </section>

    <section class="kpis" id="kpis"></section>

    <div class="footer" id="footer">&nbsp;</div>
  </div>

  <script>
    "use strict";
    const POLL_MS = 4000;

    // ---- theme from ?theme= (light default) ----
    const params = new URLSearchParams(location.search);
    const theme = params.get("theme") === "dark" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("t-" + theme).classList.add("active");

    // ---- formatters ----
    const money = (n) => (n < 0 ? "-" : "") + "$" +
      Math.abs(Number(n)).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const price = (n) => (n == null ? "—" : "$" +
      Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
    const signedPct = (n) => (n > 0 ? "+" : "") + Number(n).toFixed(2) + "%";
    const qty = (n) => (n == null ? "—" : Number(n).toLocaleString("en-US"));
    const signClass = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "flat");
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g,
      (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const clock = (iso) => { const d = new Date(iso); return isNaN(d) ? "--:--:--" :
      d.toLocaleTimeString("en-GB", { hour12: false }); };
    const glyphFor = (key) => key === "claude" ? "✳" : key === "grok" ? "𝕏" : "●";

    // ---- renderers ----
    function renderAgents(agents) {
      document.getElementById("agents").innerHTML = agents.map((a) => `
        <div class="agent">
          <div class="agent-h">
            <div class="glyph">${glyphFor(a.key)}</div>
            <div class="agent-name">${esc(a.name)}</div>
          </div>
          <div class="agent-b">
            <div class="equity-l">ACCOUNT VALUE</div>
            <div class="equity">${money(a.equity)}</div>
            <div class="rows">
              <div class="r"><span class="k">RETURN</span>
                <span class="v ${signClass(a.return_pct)}">${signedPct(a.return_pct)}</span></div>
              <div class="r"><span class="k">MAX DRAWDOWN</span>
                <span class="v">${a.max_drawdown.toFixed(2)}%</span></div>
              <div class="r"><span class="k">STARTING CAPITAL</span>
                <span class="v">${money(a.starting_equity)}</span></div>
              <div class="r"><span class="k">DECISIONS</span>
                <span class="v">${a.decisions}</span></div>
              <div class="r"><span class="k">ORDERS</span>
                <span class="v">${a.orders} <span class="flat" style="font-weight:400">(${a.orders_accepted}✓ / ${a.orders_rejected}✗)</span></span></div>
            </div>
          </div>
        </div>`).join("");
    }

    function actionChip(action, n) {
      const cls = action === "buy" ? "buy" : action === "sell" ? "sell" : "hold";
      return `<span class="chip ${cls}">${action.toUpperCase()} <b>×${n}</b></span>`;
    }

    function renderDecisions(agents, total) {
      document.getElementById("dec-total").textContent = total + " LOGGED";
      document.getElementById("decisions").innerHTML = agents.map((a) => {
        const actions = Object.entries(a.actions).sort((x, y) => y[1] - x[1])
          .map(([k, v]) => actionChip(k, v)).join("");
        const strats = Object.entries(a.strategies).sort((x, y) => y[1] - x[1])
          .map(([k, v]) => `<span class="chip">${k.toUpperCase()} <b>×${v}</b></span>`).join("");
        return `
          <div class="dec-agent">
            <div class="dec-top">
              <span class="dec-name">${esc(a.name)}</span>
              <span class="dec-count">${a.decisions} DECISIONS</span>
            </div>
            <div class="chips">${actions || '<span class="chip">—</span>'}</div>
            <div class="chips-l">STRATEGY</div>
            <div class="chips">${strats || '<span class="chip">—</span>'}</div>
          </div>`;
      }).join("");
    }

    function renderRisk(rl) {
      const rows = [
        ["MAX RISK / TRADE", rl.max_risk_per_trade_pct + "%"],
        ["MAX EXPOSURE", rl.max_exposure_pct + "%"],
        ["MAX POSITIONS", String(rl.max_positions)],
        ["DAILY-LOSS HALT", rl.daily_loss_limit_pct + "%"],
        ["STOP-LOSS RANGE", rl.min_stop_distance_pct + "% – " + rl.max_stop_distance_pct + "%"],
        ["STOP-LOSS", rl.require_stop_loss ? "REQUIRED" : "OPTIONAL"],
      ];
      document.getElementById("risk").innerHTML =
        `<div class="cannot">AGENTS CANNOT OVERRIDE</div>` +
        rows.map(([k, v]) => `<div class="risk-r"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("");
    }

    function renderOrders(orders) {
      document.getElementById("ord-sub").textContent =
        orders.length + " ORDERS · " + orders.filter((o) => !o.accepted).length + " REJECTED BY GATE";
      document.getElementById("orders").innerHTML = orders.map((o) => {
        const a = (o.action || "").toLowerCase();
        const result = o.accepted
          ? `<span class="badge ok">✓ FILLED</span>`
          : `<span class="badge rej">✗ REJECTED</span>`;
        const gate = o.accepted
          ? `<span class="reason">${esc(o.message)}</span>`
          : `<span class="reason" title="${esc(o.message)}">${esc(o.message)}</span>`;
        return `
          <tr>
            <td>${clock(o.timestamp)}</td>
            <td>${esc((o.agent || "").toUpperCase())}</td>
            <td class="action ${a}">${esc(a.toUpperCase())}</td>
            <td>${esc(o.symbol || "—")}</td>
            <td class="num">${qty(o.quantity)}</td>
            <td class="num">${price(o.price)}</td>
            <td class="num">${price(o.stop_loss)}</td>
            <td class="num">${price(o.take_profit)}</td>
            <td>${result}</td>
            <td class="reason">${gate}</td>
          </tr>`;
      }).join("") || `<tr><td colspan="10" class="flat">No orders logged yet.</td></tr>`;
    }

    function renderKpis(k) {
      const cards = [
        ["accent-blue", k.decisions, "DECISIONS LOGGED"],
        ["accent-amber", k.orders, "ORDERS PLACED"],
        ["accent-green", k.risk_gated_pct + "%", "ROUTED THRU RISK GATE"],
        ["accent-red", k.limits_summary, "% LIMITS ENFORCED"],
        ["accent-green", k.max_drawdown.toFixed(2) + "%", "MAX DD · < " + k.daily_halt_pct + "% HALT"],
      ];
      document.getElementById("kpis").innerHTML = cards.map(([cls, big, lbl]) => `
        <div class="kpi ${cls}">
          <div class="big">${big}</div>
          <div class="lbl">${lbl}</div>
        </div>`).join("");
    }

    function render(state) {
      document.getElementById("title").textContent = state.meta.title;
      document.getElementById("mode").textContent = state.meta.mode;
      document.getElementById("subtitle").textContent = state.meta.subtitle;
      document.getElementById("updated").textContent = clock(state.generated_at);
      document.getElementById("footer").textContent = state.footer;
      renderAgents(state.agents);
      renderDecisions(state.agents, state.decisions.total);
      renderRisk(state.risk_limits);
      renderOrders(state.orders);
      renderKpis(state.kpis);
    }

    async function tick() {
      try {
        const res = await fetch("/api/state", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        render(await res.json());
        document.getElementById("footer").classList.remove("err");
      } catch (e) {
        const f = document.getElementById("footer");
        f.classList.add("err");
        f.textContent = "reconnecting… (" + e.message + ")";
      }
    }

    tick();
    setInterval(tick, POLL_MS);
  </script>
</body>
</html>
