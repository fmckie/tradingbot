name: CI

# Real CI: lint, format, type-check, and test on every push and pull request.
# Additive — independent of the Claude review/mention workflows in this folder.

on:
  push:
  pull_request:

# Least-privilege token: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"  # matches requires-python floor (>=3.12)
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy .

      # Only the pytest suite runs here. test_setup.py is intentionally excluded
      # because it requires live API credentials that are not present in CI.
      - name: Test (pytest)
        run: pytest tests/ -q
